<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="45%" cy="85%" r="75%">
      <stop offset="0%" stop-color="#0d1f45"/>
      <stop offset="55%" stop-color="#060e20"/>
      <stop offset="100%" stop-color="#020509"/>
    </radialGradient>

    <!-- scia principale — larga, sfumata -->
    <linearGradient id="trail1" x1="0" y1="1" x2="0" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.9"/>
      <stop offset="25%" stop-color="#fef3c7" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#3b82f6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>

    <!-- bagliore laterale della scia -->
    <linearGradient id="trail2" x1="0" y1="1" x2="0" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.4"/>
      <stop offset="40%" stop-color="#f59e0b" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>

    <!-- scia secondaria più sottile -->
    <linearGradient id="trail3" x1="0" y1="1" x2="0" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- bagliore motore a terra -->
    <radialGradient id="exhaust" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fef3c7" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#f59e0b" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>

    <!-- nebulosa blu in alto -->
    <radialGradient id="neb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>

    <filter id="blur2">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="blur8">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <rect width="1440" height="900" fill="url(#bg)"/>

  <!-- nebulosa sfondo -->
  <ellipse cx="900" cy="200" rx="550" ry="350" fill="url(#neb)"/>

